
<!-- ALT + SHIFT + A: creamos los comentarios -->

<!-- Tipo de documento que se va a utilizar -->
<!DOCTYPE html>

<!-- Elemento raíz del documento HTML -->
<!-- Este elemento tiene un atributo que setea el idioma del archivo -->
<html lang="en">

<!-- 1. Cabecera del documento: metadatos del archivo -->
<head>
  <!-- Seteo de codificación de caracteres  -->
  <meta charset="UTF-8">

  <!-- Responsivo: adaptar el diseño a diferentes tamaños de pantalla -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título del documento -->
  <title>Clase 02 - Elementos HTML</title>
</head>

<!-- 2. Cuerpo del documento: contenido visible de la página -->
<body>

  <!-- Encabezado de la página web-->
  <header>
    <!-- barra de navegación -->
    <nav>
      <!-- Listas desordenadas: no agregan orden a los elementos -->
      <ul>
        <!-- Elementos de la lista -->
        <li>
          <!-- Enlace a la página de inicio -->
          <a href="index.html">
            Home
          </a>
        </li>
        <li>
          <a href="productos.html">
            Productos
          </a>
        </li>
        <li>
          <a href="contacto.html">
            Contacto
          </a>
        </li>
      </ul>
    </nav>
    
  </header>
  
  <!-- Contenido principal de la página -->
  <main>
    
    
  </main>
  
  <!-- Pie de página -->
  <footer>
    
  </footer>
  
</body>


</html>
